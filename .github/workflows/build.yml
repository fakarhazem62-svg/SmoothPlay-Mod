name: Build SmoothPlay Mod

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.8'

      - name: Build with Gradle
        run: gradle build --no-daemon --stacktrace

      - name: List build output
        run: |
          echo "=== build/libs contents ==="
          find . -name "*.jar" 2>/dev/null | head -30
          ls -lah build/libs/ 2>/dev/null || echo "build/libs not found"

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: SmoothPlay-Mod
          path: |
            build/libs/*.jar
            !build/libs/*-dev.jar
            !build/libs/*-sources.jar
          if-no-files-found: error
